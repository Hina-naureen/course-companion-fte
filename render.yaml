services:
  - type: web
    name: course-companion-backend
    runtime: python
    pythonVersion: 3.12.0
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEBUG
        value: false
      # SQLite for zero-config deployment (data resets on redeploy).
      # For persistent storage replace with a PostgreSQL URL from Neon/Supabase/etc:
      #   DATABASE_URL=postgresql://user:pass@host:5432/dbname
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./course_companion.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: FREE_CHAPTER_LIMIT
        value: 3
      - key: FREE_SEARCH_DAILY_LIMIT
        value: 10
      - key: FREE_QUIZ_ATTEMPTS_DAILY
        value: 9999
      - key: FREE_AI_EXPLAINS_DAILY
        value: 5
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["http://localhost:3000", "https://course-companion-fte.vercel.app"]'
